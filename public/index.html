<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Privado</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #111b21;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .chat {
        width: 100%;
        max-width: 450px;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #ece5dd;
      }

      .header {
        background: #075e54;
        color: white;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        align-items: center;
      }

      .header::before {
        content: '🟢';
        margin-right: 10px;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #e5ddd5;
      }

      .message {
        max-width: 80%;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        word-wrap: break-word;
        font-size: 15px;
      }

      .mine {
        background: #dcf8c6;
        margin-left: auto;
      }

      .other {
        background: white;
        margin-right: auto;
      }

      .input-area {
        display: flex;
        padding: 10px;
        background: #f0f2f5;
        gap: 8px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }

      #input {
        flex: 1;
        border: none;
        border-radius: 25px;
        padding: 12px 15px;
        font-size: 16px;
        outline: none;
      }

      button {
        border: none;
        border-radius: 25px;
        background: #25d366;
        color: white;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }

      @media (max-width: 600px) {
        .chat {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="chat">
      <div class="header">Chat Privado</div>

      <div id="messages"></div>

      <div class="input-area">
        <input type="text" id="input" placeholder="Escribe un mensaje..." />
        <button onclick="enviar()">Enviar</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io()

      const input = document.getElementById('input')
      const messages = document.getElementById('messages')

      function agregarMensaje(texto, tipo) {
        const div = document.createElement('div')

        div.className = 'message ' + tipo
        div.textContent = texto

        messages.appendChild(div)

        messages.scrollTop = messages.scrollHeight
      }

      function enviar() {
        const texto = input.value.trim()

        if (!texto) return

        agregarMensaje(texto, 'mine')

        socket.emit('mensaje', texto)

        input.value = ''

        input.focus()
      }

      socket.on('mensaje', texto => {
        agregarMensaje(texto, 'other')
      })

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          enviar()
        }
      })
    </script>
  </body>
</html>
