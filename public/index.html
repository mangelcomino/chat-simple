<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ofertas y promociones</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #111b21;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .chat {
        width: 100%;
        max-width: 450px;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #ece5dd;
      }

      .header {
        background: #075e54;
        color: white;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #e5ddd5;
      }

      .texto-mensaje {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message {
        max-width: 82%;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 15px;
        line-height: 1.3;
      }

      .mine {
        background: #dcf8c6;
        margin-left: auto;
      }

      .other {
        background: white;
        margin-right: auto;
      }

      .hora {
        font-size: 11px;
        color: #667781;
        text-align: right;
        margin-top: 4px;
      }

      .media {
        max-width: 100%;
        border-radius: 8px;
        display: block;
        margin-bottom: 4px;
      }

      .input-area {
        display: flex;
        align-items: flex-end;
        padding: 10px;
        background: #f0f2f5;
        gap: 8px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }

      #input {
        flex: 1;
        border: none;
        border-radius: 25px;
        padding: 12px 15px;
        font-size: 16px;
        outline: none;
        resize: none;
        overflow-y: auto;
        min-height: 46px;
        max-height: 120px;
        line-height: 20px;
        font-family: Arial, sans-serif;
      }

      button {
        border: none;
        border-radius: 25px;
        background: #25d366;
        color: white;
        padding: 12px 16px;
        font-size: 15px;
        cursor: pointer;
      }

      #attachBtn {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        padding: 0;
        font-size: 26px;
        background: #075e54;
      }

      #sendBtn {
        height: 46px;
      }

      @media (max-width: 600px) {
        .chat {
          max-width: 100%;
        }
      }
      .header {
        background: #075e54;
        color: white;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #clearBtn {
        background: transparent;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }
      .typing-indicator {
        display: none;
        width: fit-content;
        background: white;
        padding: 10px 14px;
        border-radius: 12px;
        margin: 0 15px 10px 15px;
        gap: 4px;
      }

      .typing-indicator span {
        width: 7px;
        height: 7px;
        background: #667781;
        border-radius: 50%;
        display: inline-block;
        animation: blink 1.4s infinite both;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes blink {
        0% {
          opacity: 0.2;
        }
        20% {
          opacity: 1;
        }
        100% {
          opacity: 0.2;
        }
      }

      .status-text {
        display: block;
        font-size: 12px;
        font-weight: normal;
        opacity: 0.9;
        margin-top: 2px;
      }

      #clearBtn {
        background: transparent;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="chat">
      <div class="header">
        <div>
          <span>JOP</span>
          <span id="statusText" class="status-text">desconectado</span>
        </div>

        <button id="clearBtn">🗑️</button>
      </div>

      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="input-area">
        <input type="file" id="fileInput" accept="image/*" hidden />

        <button id="attachBtn" type="button">+</button>

        <textarea
          id="input"
          rows="1"
          placeholder="Escribe un mensaje..."
        ></textarea>

        <button id="sendBtn" type="button">Enviar</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io()

      const input = document.getElementById('input')
      const messages = document.getElementById('messages')
      const sendBtn = document.getElementById('sendBtn')
      const clearBtn = document.getElementById('clearBtn')
      const attachBtn = document.getElementById('attachBtn')
      const fileInput = document.getElementById('fileInput')
      const typingIndicator = document.getElementById('typingIndicator')
      const statusText = document.getElementById('statusText')
      let typingTimeout = null

      let usuario = localStorage.getItem('usuarioChat')

      if (!usuario) {
        usuario = 'usuario-' + Math.random().toString(36).substring(2, 10)
        localStorage.setItem('usuarioChat', usuario)
      }

      socket.emit('usuarioEnChat', usuario)

      window.addEventListener('beforeunload', function () {
        socket.emit('usuarioSaleChat', usuario)
      })

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          socket.emit('usuarioSaleChat', usuario)
        } else {
          socket.emit('usuarioEnChat', usuario)
        }
      })

      function escapeHtml(texto) {
        const div = document.createElement('div')
        div.textContent = texto
        return div.innerHTML
      }

      function agregarMensaje(mensaje) {
        const div = document.createElement('div')

        div.className =
          'message ' + (mensaje.usuario === usuario ? 'mine' : 'other')

        if (mensaje.tipo === 'imagen' && mensaje.archivo) {
          div.innerHTML = `
          <img class="media" src="${mensaje.archivo}" alt="Imagen enviada">
          <div class="hora">${mensaje.hora}</div>
        `
        } else {
          div.innerHTML = ''

          const textoDiv = document.createElement('div')
          textoDiv.className = 'texto-mensaje'
          textoDiv.textContent = mensaje.texto

          const horaDiv = document.createElement('div')
          horaDiv.className = 'hora'
          horaDiv.textContent = mensaje.hora

          div.appendChild(textoDiv)
          div.appendChild(horaDiv)
        }

        messages.appendChild(div)
        messages.scrollTop = messages.scrollHeight
      }

      function enviar() {
        const texto = input.value.trim()

        if (texto === '') return

        socket.emit('mensaje', {
          tipo: 'texto',
          texto: texto,
          usuario: usuario,
        })

        input.value = ''
        input.style.height = '46px'
        input.blur()
      }

      function enviarArchivo(file) {
        if (!file) return

        if (!file.type.startsWith('image/')) {
          alert('Solo se pueden enviar imágenes o GIFs.')
          return
        }

        const temporal = document.createElement('div')
        temporal.className = 'message mine'
        temporal.innerHTML = `
          <div style="font-style: italic; color: #667781;">
            Enviando archivo...
          </div>
          <div class="hora">Enviando...</div>
        `

        messages.appendChild(temporal)
        messages.scrollTop = messages.scrollHeight

        const reader = new FileReader()

        reader.onload = function (event) {
          socket.timeout(60000).emit(
            'mensaje',
            {
              tipo: 'imagen',
              archivo: event.target.result,
              nombreArchivo: file.name,
              mimeType: file.type,
              usuario: usuario,
            },
            function (err) {
              temporal.remove()

              if (err) {
                alert('No se pudo enviar el archivo.')
              }
            },
          )
        }

        reader.onerror = function () {
          temporal.innerHTML = `
            <div>No se pudo leer el archivo</div>
            <div class="hora">Error</div>
          `
        }

        reader.readAsDataURL(file)
      }

      socket.on('historial', function (historial) {
        messages.innerHTML = ''
        historial.forEach(agregarMensaje)
      })

      socket.on('mensaje', function (mensaje) {
        agregarMensaje(mensaje)
      })

      sendBtn.addEventListener('click', enviar)

      attachBtn.addEventListener('click', function () {
        fileInput.click()
      })

      fileInput.addEventListener('change', function () {
        const file = fileInput.files[0]
        enviarArchivo(file)
        fileInput.value = ''
      })

      input.addEventListener('input', function () {
        input.style.height = 'auto'
        input.style.height = Math.min(input.scrollHeight, 120) + 'px'

        socket.emit('escribiendo', usuario)

        clearTimeout(typingTimeout)

        typingTimeout = setTimeout(() => {
          socket.emit('dejoDeEscribir', usuario)
        }, 1200)
      })
      input.addEventListener('input', function () {
        input.style.height = 'auto'
        input.style.height = Math.min(input.scrollHeight, 120) + 'px'

        socket.emit('escribiendo', usuario)

        clearTimeout(typingTimeout)

        typingTimeout = setTimeout(() => {
          socket.emit('dejoDeEscribir', usuario)
        }, 1200)
      })
      clearBtn.addEventListener('click', function () {
        const confirmar = confirm('¿Vaciar todo el chat?')

        if (!confirmar) return

        messages.innerHTML = ''
        messages.scrollTop = 0

        socket.emit('vaciarChat')
      })
      socket.on('chatVaciado', () => {
        messages.innerHTML = ''
        messages.scrollTop = 0
      })
      document.addEventListener('paste', function (event) {
        if (!event.clipboardData) return

        const items = event.clipboardData.items

        for (const item of items) {
          if (item.type.startsWith('image/')) {
            const file = item.getAsFile()
            enviarArchivo(file)
            break
          }
        }
      })

      socket.on('usuarioEscribiendo', function () {
        typingIndicator.style.display = 'flex'
      })

      socket.on('usuarioDejoDeEscribir', function () {
        typingIndicator.style.display = 'none'
      })

      socket.on('usuarioConectadoChat', function () {
        statusText.textContent = 'en línea'
      })

      socket.on('usuarioDesconectadoChat', function () {
        statusText.textContent = 'desconectado'
      })
    </script>
  </body>
</html>
