<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tencencias de temporada</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: #111b21;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .chat {
        width: 100%;
        max-width: 450px;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #ece5dd;
      }

      .header {
        background: #075e54;
        color: white;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #e5ddd5;
      }

      .message {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        word-wrap: break-word;
        font-size: 15px;
        line-height: 1.3;
      }

      .mine {
        background: #dcf8c6;
        margin-left: auto;
      }

      .other {
        background: white;
        margin-right: auto;
      }

      .hora {
        font-size: 11px;
        color: #667781;
        text-align: right;
        margin-top: 4px;
      }

      .input-area {
        display: flex;
        padding: 10px;
        background: #f0f2f5;
        gap: 8px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom));
      }

      #input {
        flex: 1;
        border: none;
        border-radius: 25px;
        padding: 12px 15px;
        font-size: 16px;
        outline: none;
        resize: none;
        overflow-y: auto;
        min-height: 46px;
        max-height: 120px;
        line-height: 20px;
        font-family: Arial, sans-serif;
      }

      button {
        border: none;
        border-radius: 25px;
        background: #25d366;
        color: white;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      @media (max-width: 600px) {
        .chat {
          max-width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="chat">
      <div class="header">Jop</div>

      <div id="messages"></div>

      <div class="input-area">
        <textarea
          id="input"
          rows="1"
          placeholder="Escribe un mensaje..."
        ></textarea>

        <button id="sendBtn">Enviar</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io()

      const input = document.getElementById('input')
      const messages = document.getElementById('messages')
      const sendBtn = document.getElementById('sendBtn')

      let usuario = localStorage.getItem('usuarioChat')

      if (!usuario) {
        usuario = 'usuario-' + Math.random().toString(36).substring(2, 10)
        localStorage.setItem('usuarioChat', usuario)
      }

      function agregarMensaje(mensaje) {
        const div = document.createElement('div')

        if (mensaje.usuario === usuario) {
          div.className = 'message mine'
        } else {
          div.className = 'message other'
        }

        div.innerHTML = `
            <div>${mensaje.texto}</div>
            <div class="hora">${mensaje.hora}</div>
        `

        messages.appendChild(div)
        messages.scrollTop = messages.scrollHeight
      }

      function enviar() {
        const texto = input.value.trim()

        if (texto === '') {
          return
        }

        socket.emit('mensaje', {
          texto: texto,
          usuario: usuario,
        })

        input.value = ''
        input.style.height = '46px'
        input.blur()
      }

      socket.on('historial', function (historial) {
        messages.innerHTML = ''
        historial.forEach(function (mensaje) {
          agregarMensaje(mensaje)
        })
      })

      socket.on('mensaje', function (mensaje) {
        agregarMensaje(mensaje)
      })

      sendBtn.addEventListener('click', enviar)

      input.addEventListener('input', function () {
        input.style.height = 'auto'
        input.style.height = Math.min(input.scrollHeight, 120) + 'px'
      })

      input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault()
          enviar()
        }
      })
    </script>
  </body>
</html>
